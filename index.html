<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Savanna Simulation Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1208; color: #e8d9a0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

  #canvas-container { width: 100vw; height: 100vh; }

  #hud {
    position: fixed; top: 16px; left: 16px;
    background: rgba(15,10,5,0.82);
    border: 1px solid rgba(200,160,60,0.3);
    border-radius: 10px;
    padding: 14px 18px;
    min-width: 220px;
    backdrop-filter: blur(6px);
  }
  #hud h2 { font-size: 13px; color: #c8a040; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }

  .animal-row {
    display: flex; align-items: center; gap: 8px;
    margin: 6px 0; font-size: 12px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .label { flex: 1; color: #c8b87a; }
  .count { color: #e8d080; font-weight: 600; min-width: 18px; text-align: right; }

  #stats {
    position: fixed; bottom: 16px; left: 16px;
    background: rgba(15,10,5,0.82);
    border: 1px solid rgba(200,160,60,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 11px; color: #907850;
  }

  #legend {
    position: fixed; top: 16px; right: 16px;
    background: rgba(15,10,5,0.82);
    border: 1px solid rgba(200,160,60,0.2);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 11px;
  }
  #legend h3 { font-size: 11px; color: #c8a040; margin-bottom: 8px; letter-spacing: 0.06em; text-transform: uppercase; }
  .terrain-row { display: flex; align-items: center; gap: 7px; margin: 4px 0; color: #a89060; }
  .terrain-swatch { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }

  #loading {
    position: fixed; inset: 0;
    background: #1a1208;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100;
    transition: opacity 0.6s;
  }
  #loading h1 { font-size: 28px; color: #c8a040; margin-bottom: 8px; }
  #loading p  { color: #907850; font-size: 14px; }
  .loader { width: 40px; height: 4px; background: rgba(200,160,60,0.2); border-radius: 2px; margin-top: 20px; overflow: hidden; }
  .loader-bar { height: 100%; background: #c8a040; border-radius: 2px; animation: load 1.4s ease-in-out infinite; }
  @keyframes load { 0%{width:0;margin-left:0} 50%{width:100%;margin-left:0} 100%{width:0;margin-left:100%} }

  #controls {
    position: fixed; bottom: 16px; right: 16px;
    background: rgba(15,10,5,0.82);
    border: 1px solid rgba(200,160,60,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 11px; color: #907850;
  }
  #controls button {
    background: rgba(200,160,60,0.15);
    border: 1px solid rgba(200,160,60,0.3);
    color: #c8a040;
    border-radius: 5px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    margin: 3px;
    transition: background 0.2s;
  }
  #controls button:hover { background: rgba(200,160,60,0.3); }
</style>
</head>
<body>

<div id="loading">
  <h1>🦁 Savanna Sim</h1>
  <p>サバンナ生態系を初期化中...</p>
  <div class="loader"><div class="loader-bar"></div></div>
</div>

<div id="canvas-container"></div>

<!-- HUD -->
<div id="hud">
  <h2>🌍 Population</h2>
  <div class="animal-row">
    <div class="dot" style="background:#e6b320"></div>
    <div class="label">ライオン</div>
    <div class="count" id="cnt-lion">2</div>
  </div>
  <div class="animal-row">
    <div class="dot" style="background:#f0f0f0"></div>
    <div class="label">シマウマ</div>
    <div class="count" id="cnt-zebra">4</div>
  </div>
  <div class="animal-row">
    <div class="dot" style="background:#c89040"></div>
    <div class="label">ガゼル</div>
    <div class="count" id="cnt-gazelle">5</div>
  </div>
  <div class="animal-row">
    <div class="dot" style="background:#808088"></div>
    <div class="label">象</div>
    <div class="count" id="cnt-elephant">2</div>
  </div>
  <hr style="border-color:rgba(200,160,60,0.2);margin:8px 0">
  <div class="animal-row">
    <div class="label" style="color:#907850">ステップ</div>
    <div class="count" id="cnt-step">0</div>
  </div>
</div>

<!-- 地形凡例 -->
<div id="legend">
  <h3>地形</h3>
  <div class="terrain-row"><div class="terrain-swatch" style="background:#d4b872"></div>平地</div>
  <div class="terrain-row"><div class="terrain-swatch" style="background:#8a7a6a"></div>山岳</div>
  <div class="terrain-row"><div class="terrain-swatch" style="background:#3a7a3a"></div>森林</div>
  <div class="terrain-row"><div class="terrain-swatch" style="background:#3a88d8"></div>水飲み場</div>
</div>

<!-- Stats -->
<div id="stats">
  <span id="stat-text">シミュレーション実行中...</span>
</div>

<!-- Controls -->
<div id="controls">
  <div style="margin-bottom:6px;color:#c8a040;font-size:11px">コントロール</div>
  <button onclick="togglePause()">⏸ 一時停止</button>
  <button onclick="resetSim()">↺ リセット</button>
  <button onclick="toggleSpeed()">⚡ 速度切替</button>
  <div style="margin-top:6px;color:#604030;font-size:10px">マウスドラッグ: 視点回転<br>スクロール: ズーム</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ================================================================
// 世界設定 (savanna_sim.py と同期)
// ================================================================
const WORLD_SIZE = 20;
const CELL       = 1.0;

const TERRAIN_PLAIN    = 0;
const TERRAIN_MOUNTAIN = 1;
const TERRAIN_FOREST   = 2;
const TERRAIN_WATER    = 3;

const SPECIES_LION     = 0;
const SPECIES_ZEBRA    = 1;
const SPECIES_GAZELLE  = 2;
const SPECIES_ELEPHANT = 3;

// 地形マップ (Python側と同じシード42の生成結果を手動移植)
function makeTerrainMap() {
  const g = Array.from({length: WORLD_SIZE}, () => new Array(WORLD_SIZE).fill(TERRAIN_PLAIN));
  const mountains = [[3,15],[3,16],[4,15],[4,16],[4,17],[5,15],[5,16],[2,14],[3,14],[15,3],[16,3],[16,4],[17,4]];
  const forests   = [[8,2],[8,3],[9,2],[9,3],[9,4],[10,2],[10,3],[11,1],[11,2],[12,2],[12,3],[6,1],[7,1],[7,2]];
  const waters    = [[10,10],[10,11],[11,10],[11,11],[16,16],[16,17],[17,16]];
  for (const [r,c] of mountains) g[r][c] = TERRAIN_MOUNTAIN;
  for (const [r,c] of forests)   g[r][c] = TERRAIN_FOREST;
  for (const [r,c] of waters)    g[r][c] = TERRAIN_WATER;
  return g;
}
const TERRAIN_MAP = makeTerrainMap();

const TERRAIN_COLORS = {
  [TERRAIN_PLAIN]:    0xd4b872,
  [TERRAIN_MOUNTAIN]: 0x8a7a6a,
  [TERRAIN_FOREST]:   0x3a7a3a,
  [TERRAIN_WATER]:    0x3a88d8,
};
const TERRAIN_HEIGHT = {
  [TERRAIN_PLAIN]:    0.05,
  [TERRAIN_MOUNTAIN]: 3.0,
  [TERRAIN_FOREST]:   0.3,
  [TERRAIN_WATER]:    0.01,
};

const ANIMAL_DEFS = [
  { species: SPECIES_LION,     n: 2, color: 0xe6b320, size: [0.5,0.5,0.4], speed: 0.45, name: "Lion",     thirstRate: 0.008, hungerRate: 0.015, obsRadius: 5, canClimb: true  },
  { species: SPECIES_ZEBRA,    n: 4, color: 0xf0f0f0, size: [0.45,0.45,0.6], speed: 0.39, name: "Zebra",    thirstRate: 0.010, hungerRate: 0.008, obsRadius: 4, canClimb: false },
  { species: SPECIES_GAZELLE,  n: 5, color: 0xc89040, size: [0.3,0.3,0.35],  speed: 0.54, name: "Gazelle",  thirstRate: 0.007, hungerRate: 0.006, obsRadius: 6, canClimb: false },
  { species: SPECIES_ELEPHANT, n: 2, color: 0x808088, size: [0.7,0.7,0.8],   speed: 0.27, name: "Elephant", thirstRate: 0.020, hungerRate: 0.005, obsRadius: 3, canClimb: false },
];

// ================================================================
// Three.js セットアップ
// ================================================================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x87ceeb, 1); // サバンナの空
document.getElementById('canvas-container').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xd4c080, 0.012);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(10, -8, 20);
camera.lookAt(10, 10, 0);

// 照明
const sun = new THREE.DirectionalLight(0xffeebb, 1.8);
sun.position.set(8, -5, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 80;
sun.shadow.camera.left = -15;
sun.shadow.camera.right = 15;
sun.shadow.camera.top = 15;
sun.shadow.camera.bottom = -15;
scene.add(sun);

const ambient = new THREE.AmbientLight(0xffd090, 0.5);
scene.add(ambient);

const hemi = new THREE.HemisphereLight(0x87ceeb, 0xb8954a, 0.4);
scene.add(hemi);

// ================================================================
// 地形構築
// ================================================================
function buildTerrain() {
  // ベース地面
  const baseGeo = new THREE.BoxGeometry(WORLD_SIZE, WORLD_SIZE, 0.1);
  const baseMat = new THREE.MeshLambertMaterial({ color: 0xc8a050 });
  const base    = new THREE.Mesh(baseGeo, baseMat);
  base.position.set(WORLD_SIZE/2, WORLD_SIZE/2, -0.05);
  base.receiveShadow = true;
  scene.add(base);

  for (let r = 0; r < WORLD_SIZE; r++) {
    for (let c = 0; c < WORLD_SIZE; c++) {
      const t  = TERRAIN_MAP[r][c];
      if (t === TERRAIN_PLAIN) continue;

      const cx = c * CELL + CELL / 2;
      const cy = r * CELL + CELL / 2;
      const h  = TERRAIN_HEIGHT[t];
      const mat = new THREE.MeshLambertMaterial({ color: TERRAIN_COLORS[t] });

      if (t === TERRAIN_MOUNTAIN) {
        // 山体
        const geo = new THREE.BoxGeometry(CELL * 0.85, CELL * 0.85, h);
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(cx, cy, h / 2);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
        // 山頂
        const tGeo = new THREE.BoxGeometry(CELL*0.3, CELL*0.3, 0.5);
        const tMat = new THREE.MeshLambertMaterial({ color: 0x9a9290 });
        const top  = new THREE.Mesh(tGeo, tMat);
        top.position.set(cx, cy, h + 0.25);
        top.castShadow = true;
        scene.add(top);
      } else if (t === TERRAIN_FOREST) {
        // 幹
        const tGeo = new THREE.BoxGeometry(0.12, 0.12, 0.8);
        const tMat = new THREE.MeshLambertMaterial({ color: 0x6b3d10 });
        const trunk = new THREE.Mesh(tGeo, tMat);
        trunk.position.set(cx, cy, 0.4);
        trunk.castShadow = true;
        scene.add(trunk);
        // 樹冠
        const cGeo = new THREE.BoxGeometry(0.65, 0.65, 0.7);
        const crown = new THREE.Mesh(cGeo, mat);
        crown.position.set(cx, cy, 1.1);
        crown.castShadow = true;
        scene.add(crown);
      } else if (t === TERRAIN_WATER) {
        const geo  = new THREE.BoxGeometry(CELL*0.95, CELL*0.95, 0.04);
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(cx, cy, 0.02);
        scene.add(mesh);
        // 水の反射っぽいオーバーレイ
        const wGeo = new THREE.BoxGeometry(CELL*0.9, CELL*0.9, 0.001);
        const wMat = new THREE.MeshLambertMaterial({ color: 0x80c0ff, transparent: true, opacity: 0.5 });
        const wave = new THREE.Mesh(wGeo, wMat);
        wave.position.set(cx, cy, 0.042);
        scene.add(wave);
      }
    }
  }
}

// ================================================================
// 動物 3Dオブジェクト生成
// ================================================================
const animalMeshes = [];
const animalStates = [];

function buildAnimals() {
  let aid = 0;
  const spawns = makeSpawnPositions();

  for (const def of ANIMAL_DEFS) {
    for (let k = 0; k < def.n; k++, aid++) {
      const [sx, sy] = spawns[aid];
      const geo  = new THREE.BoxGeometry(...def.size);
      const mat  = new THREE.MeshLambertMaterial({ color: def.color });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      mesh.position.set(sx, sy, def.size[2]/2 + 0.05);
      scene.add(mesh);
      animalMeshes.push(mesh);
      animalStates.push({
        species: def.species,
        def: def,
        pos: [sx, sy],
        thirst: 0,
        hunger: 0,
        alive: true,
        vel: [0, 0],
      });
    }
  }
}

function makeSpawnPositions() {
  // 確定的な初期位置 (Python側 seed=7 と同じ配置を近似)
  return [
    [14.2, 7.3], [15.8, 12.1],               // lions
    [7.4, 8.2], [9.1, 11.5], [11.3, 7.8], [8.7, 9.2],  // zebras
    [6.2, 3.5], [9.4, 5.7], [8.1, 4.3], [11.2, 6.1], [7.8, 2.8], // gazelles
    [9.5, 9.8], [11.2, 10.5],               // elephants
  ];
}

// ================================================================
// シミュレーションロジック (JavaScript移植)
// ================================================================
const MOVES = [[0,1],[0,-1],[-1,0],[1,0],[0,0]];

function terrainAt(px, py) {
  const r = Math.max(0, Math.min(WORLD_SIZE-1, Math.floor(py)));
  const c = Math.max(0, Math.min(WORLD_SIZE-1, Math.floor(px)));
  return TERRAIN_MAP[r][c];
}

function nearestWater(px, py) {
  let bestDist = Infinity, bestDx = 0, bestDy = 0;
  for (let r=0;r<WORLD_SIZE;r++) for (let c=0;c<WORLD_SIZE;c++) {
    if (TERRAIN_MAP[r][c] !== TERRAIN_WATER) continue;
    const wx = c+0.5, wy = r+0.5;
    const dx = wx-px, dy = wy-py;
    const d = Math.hypot(dx, dy);
    if (d < bestDist) { bestDist=d; bestDx=dx; bestDy=dy; }
  }
  return {dx:bestDx, dy:bestDy, dist:bestDist};
}

function nearestOfSpecies(aid, targetSpecies) {
  let bestDist = Infinity, bestDx=0, bestDy=0;
  for (let i=0;i<animalStates.length;i++) {
    if (!animalStates[i].alive) continue;
    if (i === aid) continue;
    if (animalStates[i].species !== targetSpecies) continue;
    const dx = animalStates[i].pos[0] - animalStates[aid].pos[0];
    const dy = animalStates[i].pos[1] - animalStates[aid].pos[1];
    const d = Math.hypot(dx,dy);
    if (d < bestDist) { bestDist=d; bestDx=dx; bestDy=dy; }
  }
  return {dx:bestDx, dy:bestDy, dist:bestDist};
}

function heuristicAction(aid) {
  const s = animalStates[aid];
  const sp = s.species;
  const [px,py] = s.pos;
  const wt = nearestWater(px, py);
  const def = s.def;

  let targetDx = 0, targetDy = 0;
  let actionBias = [0,0,0,0,1]; // 静止バイアス

  if (sp === SPECIES_LION) {
    // 最も近い草食獣を追いかける
    let bestDist = Infinity, targetIdx = -1;
    for (let i=0;i<animalStates.length;i++) {
      if (!animalStates[i].alive || animalStates[i].species === SPECIES_LION) continue;
      const d = Math.hypot(animalStates[i].pos[0]-px, animalStates[i].pos[1]-py);
      if (d < bestDist) { bestDist=d; targetIdx=i; }
    }
    if (targetIdx >= 0 && bestDist < 8) {
      targetDx = animalStates[targetIdx].pos[0] - px;
      targetDy = animalStates[targetIdx].pos[1] - py;
    } else if (s.thirst > 0.5) {
      targetDx = wt.dx; targetDy = wt.dy;
    } else {
      targetDx = (Math.random()-0.5)*2; targetDy = (Math.random()-0.5)*2;
    }
  } else {
    // 草食獣: ライオンから逃げる、のどが渇いたら水場へ
    const lion = nearestOfSpecies(aid, SPECIES_LION);
    if (s.thirst > 0.6) {
      targetDx = wt.dx; targetDy = wt.dy;
    } else if (lion.dist < 6) {
      targetDx = -lion.dx * 2; targetDy = -lion.dy * 2; // 逃げる
    } else {
      // 草を食みながらゆっくり移動
      targetDx = (Math.random()-0.5); targetDy = (Math.random()-0.5);
    }
  }

  // targetDx/dyをMOVESに変換
  const scores = MOVES.map(([mx,my]) => {
    const dot = mx * targetDx + my * targetDy;
    return dot;
  });
  const maxScore = Math.max(...scores);
  const candidates = scores.map((s,i)=>s>=maxScore-0.01?i:-1).filter(i=>i>=0);
  return candidates[Math.floor(Math.random()*candidates.length)];
}

function stepAnimal(aid) {
  const s = animalStates[aid];
  if (!s.alive) return;
  const def = s.def;

  const action = heuristicAction(aid);
  const [mx, my] = MOVES[action];
  let nx = s.pos[0] + mx * def.speed;
  let ny = s.pos[1] + my * def.speed;
  nx = Math.max(0.1, Math.min(WORLD_SIZE-0.1, nx));
  ny = Math.max(0.1, Math.min(WORLD_SIZE-0.1, ny));

  const newT = terrainAt(nx, ny);
  if (newT === TERRAIN_MOUNTAIN && !def.canClimb) {
    nx = s.pos[0]; ny = s.pos[1];
  }

  s.pos[0] = nx; s.pos[1] = ny;
  s.thirst += def.thirstRate;
  s.hunger += def.hungerRate;

  const curT = terrainAt(nx, ny);
  if (curT === TERRAIN_WATER) s.thirst = Math.max(0, s.thirst - 0.12);
  if (s.species !== SPECIES_LION && (curT === TERRAIN_PLAIN || curT === TERRAIN_FOREST))
    s.hunger = Math.max(0, s.hunger - 0.018);

  // 捕食
  if (s.species === SPECIES_LION) {
    for (let i=0;i<animalStates.length;i++) {
      if (!animalStates[i].alive || animalStates[i].species === SPECIES_LION) continue;
      const d = Math.hypot(animalStates[i].pos[0]-nx, animalStates[i].pos[1]-ny);
      if (d < 0.9) {
        animalStates[i].alive = false;
        s.hunger = Math.max(0, s.hunger - 0.5);
      }
    }
  }

  // 死亡チェック
  if (s.thirst >= 1.0 || s.hunger >= 1.0) s.alive = false;
}

// ================================================================
// 3Dメッシュ更新
// ================================================================
function updateMeshes() {
  for (let i=0;i<animalStates.length;i++) {
    const s = animalStates[i];
    const mesh = animalMeshes[i];
    if (!s.alive) {
      mesh.visible = false;
      continue;
    }
    mesh.visible = true;
    const [px, py] = s.pos;
    const t = terrainAt(px, py);
    let pz = s.def.size[2]/2 + 0.05;
    if (t === TERRAIN_MOUNTAIN) pz += TERRAIN_HEIGHT[TERRAIN_MOUNTAIN];
    else if (t === TERRAIN_FOREST) pz += 0.2;
    mesh.position.set(px, py, pz);
  }
}

// ================================================================
// HUD更新
// ================================================================
function updateHUD(step) {
  const counts = {[SPECIES_LION]:0,[SPECIES_ZEBRA]:0,[SPECIES_GAZELLE]:0,[SPECIES_ELEPHANT]:0};
  for (const s of animalStates) if (s.alive) counts[s.species]++;
  document.getElementById('cnt-lion').textContent     = counts[SPECIES_LION];
  document.getElementById('cnt-zebra').textContent    = counts[SPECIES_ZEBRA];
  document.getElementById('cnt-gazelle').textContent  = counts[SPECIES_GAZELLE];
  document.getElementById('cnt-elephant').textContent = counts[SPECIES_ELEPHANT];
  document.getElementById('cnt-step').textContent     = step;

  const total = Object.values(counts).reduce((a,b)=>a+b,0);
  document.getElementById('stat-text').textContent =
    `生存: ${total}/${animalStates.length}匹 | ` +
    `Lions: ${counts[SPECIES_LION]} | ` +
    `Prey: ${counts[SPECIES_ZEBRA]+counts[SPECIES_GAZELLE]+counts[SPECIES_ELEPHANT]}`;
}

// ================================================================
// カメラ軌道コントロール (簡易)
// ================================================================
let isDragging = false, lastMX = 0, lastMY = 0;
let cameraTheta = -0.5, cameraPhi = 0.6, cameraR = 25;

renderer.domElement.addEventListener('mousedown', e => { isDragging=true; lastMX=e.clientX; lastMY=e.clientY; });
renderer.domElement.addEventListener('mouseup',   () => isDragging=false);
renderer.domElement.addEventListener('mousemove', e => {
  if (!isDragging) return;
  cameraTheta += (e.clientX - lastMX) * 0.01;
  cameraPhi   -= (e.clientY - lastMY) * 0.01;
  cameraPhi    = Math.max(0.15, Math.min(1.4, cameraPhi));
  lastMX=e.clientX; lastMY=e.clientY;
});
renderer.domElement.addEventListener('wheel', e => {
  cameraR = Math.max(6, Math.min(50, cameraR + e.deltaY * 0.05));
});

function updateCamera() {
  const cx = WORLD_SIZE/2, cy = WORLD_SIZE/2;
  camera.position.set(
    cx + cameraR * Math.cos(cameraTheta) * Math.cos(cameraPhi),
    cy + cameraR * Math.sin(cameraTheta) * Math.cos(cameraPhi),
    cameraR * Math.sin(cameraPhi)
  );
  camera.lookAt(cx, cy, 1);
}

// ================================================================
// シミュレーションループ制御
// ================================================================
let paused = false, step = 0, simSpeed = 1;
const MAX_STEPS = 300;

function togglePause() {
  paused = !paused;
  document.querySelector('#controls button:first-of-type').textContent =
    paused ? '▶ 再開' : '⏸ 一時停止';
}
function toggleSpeed() {
  simSpeed = simSpeed === 1 ? 3 : 1;
  document.querySelector('#controls button:last-of-type').textContent =
    simSpeed === 1 ? '⚡ 速度切替' : '🐢 速度切替';
}
function resetSim() {
  step = 0;
  for (const s of animalStates) s.alive = true;
  const spawns = makeSpawnPositions();
  for (let i=0;i<animalStates.length;i++) {
    animalStates[i].pos = [...spawns[i]];
    animalStates[i].thirst = 0;
    animalStates[i].hunger = 0;
  }
}

// ================================================================
// メインループ
// ================================================================
let frameCount = 0;
function animate() {
  requestAnimationFrame(animate);
  frameCount++;

  if (!paused && frameCount % 8 === 0) {
    for (let s=0;s<simSpeed;s++) {
      if (step >= MAX_STEPS) { step = 0; resetSim(); return; }
      const order = [...Array(animalStates.length).keys()].sort(()=>Math.random()-0.5);
      for (const aid of order) stepAnimal(aid);
      step++;
    }
    updateHUD(step);
    updateMeshes();
  }

  updateCamera();
  renderer.render(scene, camera);
}

// ================================================================
// 初期化
// ================================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

buildTerrain();
buildAnimals();
updateMeshes();
updateHUD(0);

setTimeout(() => {
  const el = document.getElementById('loading');
  el.style.opacity = '0';
  setTimeout(() => el.remove(), 600);
  animate();
}, 800);
</script>
</body>
</html>
